name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # runs twice a day
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: YashLagare
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Slow down animation
        run: |
          python3 - <<'EOF'
          import re, glob

          SLOW_FACTOR = 1.6  # increase this to make it even slower

          for file in glob.glob("dist/*.svg"):
              with open(file, "r") as f:
                  content = f.read()

              def scale(match):
                  value = float(match.group(1))
                  return f'dur="{round(value * SLOW_FACTOR, 3)}s"'

              content = re.sub(r'dur="([\d.]+)s"', scale, content)

              with open(file, "w") as f:
                  f.write(content)
          EOF

      - name: Push output to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
